<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;600;700&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { width: 320px; font-family: "Nunito Sans", -apple-system, sans-serif; color: #2c2416; background: #f7f5f2; }
    .popup { padding: 20px; }
    .popup__header { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
    .popup__logo { font-size: 28px; }
    .popup__title { font-size: 18px; font-weight: 700; }
    .popup__subtitle { font-size: 12px; color: #8a7e6e; font-weight: 400; }
    .popup__status { padding: 10px 14px; border-radius: 8px; margin-bottom: 14px; font-size: 13px; line-height: 1.5; }
    .popup__status--active  { background: #e6f4ec; color: #2d6b45; border: 1px solid #b8dfc8; }
    .popup__status--inactive { background: #fef3ec; color: #9b5623; border: 1px solid #f0d4b8; }
    .popup__section { margin-bottom: 14px; }
    .popup__section-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: #8a7e6e; margin-bottom: 6px; }
    .diag-row { display: flex; align-items: center; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #e2ddd5; font-size: 12px; color: #5c5245; }
    .diag-row:last-child { border-bottom: none; }
    .diag-badge { font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 10px; }
    .diag-badge--ok   { background: #e6f4ec; color: #2d6b45; }
    .diag-badge--warn { background: #fef3ec; color: #9b5623; }
    .popup__footer { text-align: center; padding-top: 12px; border-top: 1px solid #e2ddd5; font-size: 11px; color: #8a7e6e; }
  </style>
</head>
<body>
  <div class="popup">
    <div class="popup__header">
      <span class="popup__logo">🏠💬</span>
      <div>
        <div class="popup__title">Funda Reacties</div>
        <div class="popup__subtitle">v1.0.0 · community edition</div>
      </div>
    </div>

    <div class="popup__status popup__status--active" id="status">Bezig met laden…</div>

    <div class="popup__section">
      <div class="popup__section-title">Gebruiker</div>
      <div id="profile-section">
        <div class="diag-row"><span>Laden…</span></div>
      </div>
    </div>

    <div class="popup__section">
      <div class="popup__section-title">Systeem status</div>
      <div class="diag-row"><span>Extensie actief</span><span class="diag-badge diag-badge--ok">✓ OK</span></div>
      <div class="diag-row"><span>Notificaties</span><span class="diag-badge" id="diag-notif">…</span></div>
      <div class="diag-row"><span>Database verbinding</span><span class="diag-badge" id="diag-supabase">…</span></div>
    </div>

    <div class="popup__footer">Door de community, voor de community</div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
